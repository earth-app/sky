name: Build Project

on: [push, pull_request]

jobs:
  build-ios:
    runs-on: macos-latest
    timeout-minutes: 30

    permissions:
      contents: read
      packages: read
      id-token: write
      attestations: write

    steps:
      - uses: actions/checkout@v6
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 'latest'
          registries: |
            https://registry.npmjs.org/
            @earth-app:https://npm.pkg.github.com|$GITHUB_TOKEN
      - name: Install dependencies
        run: bun install --frozen-lockfile
        env:
          GITHUB_TOKEN: ${{ github.token }}
      - name: Build Project
        run: bun run generate:ios
      - name: Archive Build Artifacts
        id: archive
        uses: actions/upload-artifact@v7
        with:
          name: sky-build-ios-${{ github.run_id }}
          path: dist/
          overwrite: true
      - name: Attest Build Artifacts
        if: success() || failure()
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: sky-build-ios-${{ github.run_id }}
          subject-digest: sha256:${{ steps.archive.outputs.artifact-digest }}

  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: read
      packages: read
      id-token: write
      attestations: write

    steps:
      - uses: actions/checkout@v6
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 'latest'
          registries: |
            https://registry.npmjs.org/
            @earth-app:https://npm.pkg.github.com|$GITHUB_TOKEN
      - name: Install dependencies
        run: bun install --frozen-lockfile
        env:
          GITHUB_TOKEN: ${{ github.token }}
      - name: Build Project
        run: bun run generate:android
      - name: Archive Build Artifacts
        id: archive
        uses: actions/upload-artifact@v7
        with:
          name: sky-build-android-${{ github.run_id }}
          path: dist/
          overwrite: true
      - name: Attest Build Artifacts
        if: success() || failure()
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: sky-build-android-${{ github.run_id }}
          subject-digest: sha256:${{ steps.archive.outputs.artifact-digest }}

  unit:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: read
      packages: read

    steps:
      - uses: actions/checkout@v6
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 'latest'
          registries: |
            https://registry.npmjs.org/
            @earth-app:https://npm.pkg.github.com|$GITHUB_TOKEN
      - name: Install dependencies
        run: |
          bun install --frozen-lockfile
          bun run postinstall
        env:
          GITHUB_TOKEN: ${{ github.token }}
      - name: Run unit tests with Coverage
        run: bun run test:unit:coverage
      - name: Upload to Codecov
        if: ${{ always() }}
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: earth-app/sky
          fail_ci_if_error: false
          flags: unit
          files: |
            coverage/lcov.info
            coverage/coverage-final.json
      - name: Archive Unit Coverage Artifacts
        if: ${{ always() && github.event_name == 'push' }}
        uses: actions/upload-artifact@v7
        with:
          name: unit-coverage-artifacts-${{ github.run_id }}
          path: coverage/
          retention-days: 14

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: read
      packages: read

    steps:
      - uses: actions/checkout@v6
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 'latest'
          registries: |
            https://registry.npmjs.org/
            @earth-app:https://npm.pkg.github.com|$GITHUB_TOKEN
      - name: Install dependencies
        run: |
          bun install --frozen-lockfile
          bun run postinstall
        env:
          GITHUB_TOKEN: ${{ github.token }}
      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium
      - name: Build Test Build
        run: bun run build:test
      - name: Run E2E tests with Coverage
        run: bun run test:e2e:coverage
        env:
          CI: true
          COVERAGE: '1'
          PLAYWRIGHT_PROD: '1'
      - name: Upload Playwright Artifacts (Failure)
        if: ${{ failure() && github.event_name == 'push' }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            playwright-report/
            playwright-results/
            .coverage/
          retention-days: 7
      - name: Upload to Codecov
        if: ${{ always() }}
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: earth-app/sky
          fail_ci_if_error: false
          flags: e2e-mocked
          files: |
            coverage/lcov.info
            coverage/coverage-final.json
      - name: Archive Coverage Artifacts
        if: ${{ always() && github.event_name == 'push' }}
        uses: actions/upload-artifact@v7
        with:
          name: coverage-artifacts-${{ github.run_id }}
          path: coverage/
          retention-days: 14
